<!DOCTYPE html>
<html lang="it">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>IPOTESI</title>
        <style>
            body {
                font-family: Arial, sans-serif;
                line-height: 1.6;
                margin: 20px;
            }

            .header {
                height: 6vh;
                display: flex;
                justify-content: center;
                align-items: center;
                font-size: 6vh;
                font-weight: bold;
                line-height: 5vh;
            }

            .link {
                position: absolute;
                top: 20px;
                left: 20px;
            }

            .link a {
                color: #1a73e8;
                text-decoration: none;
                font-weight: bold;
                transition: color 0.3s ease;
            }

            .link a:hover {
                color: #d93025;
                text-decoration: underline;
            }

            .link a:visited {
                color: #4b0082;
            }

            .content {
                max-width: 800px;
                margin: 0 auto;
                padding: 20px;
                border: 1px solid #ccc;
                background-color: #f9f9f9;
            }

            p {
                margin-bottom: 15px;
            }

            strong {
                font-weight: bold;
            }
        </style>
    </head>

    <body>
        <div class="header"> IPOTESI </div>
        <div class="link">
            <a href="http://www.ipotesi.eu" target="_blank">www.ipotesi.eu</a>
        </div>
        <div class="content">
            {html_content}
        </div>
    </body>

</html>
